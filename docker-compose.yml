version: "3.9"

services:
  backend:
    build: ./backend
    container_name: edulearn_backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    container_name: edulearn_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - backend

  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
