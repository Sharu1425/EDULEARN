# ── EDULEARN Docker Compose ───────────────────────────────────────────────────
# Run: docker-compose up --build
# Services: backend, frontend, prometheus, grafana
#
# NOTE: This is OPTIONAL. Local development uses:
#   Backend:  py main.py (port 5001)
#   Frontend: npm run dev (port 5173)
#
# Vercel + Render deployment does NOT require this file.

version: '3.8'

services:

  # ── FastAPI Backend ─────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edulearn-backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      # Override FRONTEND_URL to use Docker service name
      FRONTEND_URL: "http://localhost:3000"
    restart: unless-stopped
    networks:
      - edulearn-network

  # ── React Frontend ──────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development       # Use "production" for HF Spaces build
    container_name: edulearn-frontend
    ports:
      - "3000:3000"
    environment:
      # Inside Docker, frontend calls backend via service name
      VITE_API_BASE_URL: "http://backend:5001"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - edulearn-network

  # ── Prometheus (Metrics Collection) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: edulearn-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - edulearn-network

  # ── Grafana (Dashboards) ────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: edulearn-grafana
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - edulearn-network

networks:
  edulearn-network:
    driver: bridge

volumes:
  grafana-data:
