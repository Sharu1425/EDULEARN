apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: edulearn-frontend
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: VITE_API_BASE_URL
              value: "http://localhost:30007" # In K8s NodePort mode, frontend calls via public IP/Port
---
apiVersion: v1
kind: Service
metadata:
  name: frontend-service
  namespace: default
spec:
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
  type: ClusterIP
